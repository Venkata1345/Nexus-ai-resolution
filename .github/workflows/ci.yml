name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # Install the project + dev extras (pytest, ruff). chromadb/torch are
        # already runtime deps but we don't need them for lint+unit tests; we
        # install the full set anyway so test imports match production.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        # Tests set GEMINI_API_KEY via conftest.py, but exporting here keeps
        # any direct `python -m src.something` invocations happy too.
        env:
          GEMINI_API_KEY: test-key-not-used
        run: pytest --cov --cov-report=term-missing --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore
