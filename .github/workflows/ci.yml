name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # Preinstall CPU-only torch so sentence-transformers doesn't drag in
        # the GPU build (~2 GB of NVIDIA CUDA wheels, times out the runner).
        # After that, the editable install sees torch as already-satisfied.
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        # Tests set GEMINI_API_KEY via conftest.py, but exporting here keeps
        # any direct `python -m src.something` invocations happy too.
        # Coverage is printed for visibility but not gated — offline pipeline
        # scripts skew the total, and gating on a number this project doesn't
        # really care about is more noise than signal.
        env:
          GEMINI_API_KEY: test-key-not-used
        run: pytest --cov --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore
